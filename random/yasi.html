<!DOCTYPE html>
<html>
<head>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
window.addEventListener('load', function() {
	document.getElementById('myFiles').addEventListener('change', function() {
		if (this.files) {
			const urls = []
			for (let i = 0; i < this.files.length; i++) {
				urls.push(URL.createObjectURL(this.files[i]));
			}
			console.log(urls);
			var can = document.getElementById("myCanvas");
			var ctx = can.getContext("2d");
			for (let r = 0; r < 5; r++) {
				for (let c = 0; c < 4; c++) {
					var img = new Image();
					img.onload = function(){
						ctx.drawImage(this, 75+600*c, 150+600*r, 600, 600);
					};
					console.log(r,c,4*r+c,urls.length,(4*r+c) % urls.length,urls[(4*r+c) % urls.length]);
					img.src = urls[(4*r+c) % urls.length];
				}
			}
		}
	});
});
</script>
</head>
<body>

<h1>Upload images:</h1>
<input type="file" id="myFiles" multiple="true"><br><br>
<div><canvas id="myCanvas" width=2550 height=3300>No canvas here</canvas></div>
</body>
</html>
